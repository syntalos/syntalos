# What's-New entries shown after a Syntalos upgrade.

[[entry]]
version = "3.1.0"
title = "Welcome to Syntalos 3.1!"
body = """
<p>Syntalos 3.1 brings some exciting new features and includes backwards-compatible changes,
with one exception: You now need to select the data input type on your <em>Zarr Writer</em>
and <em>JSON Writer</em> modules explicitly in their settings and reconnect them.</p>

<h3>What's new</h3>
<ul>
  <li>Fixed an issue where in-flight samples could be lost for external modules under memory pressure.</li>
  <li>New <em>Camera</em> module for more robust webcam recordings.</li>
  <li>New <em>Signal Filter</em> module to apply IIR filters to signals available for testing.</li>
  <li>The <em>Open Ephys AcqBoard</em> module is now out of beta.</li>
  <li>The <em>Latency Check</em> module is no longer a developer module, and can be used
      for advanced latency monitoring in projects.</li>
  <li>Bugfixes and improvements to all camera modules.</li>
  <li>... and many more changes and fixes!</li>
</ul>

<h3>Heads-up</h3>
<p>Support for the SDK behind the <code>camera-tis</code> module has been
discontinued by The Imaging Source. The module is now disabled by default for
builds from source, and will not be available on all platforms going forward.</p>
"""

[[entry]]
version = "3.0.0"
title = "Welcome to Syntalos 3.0!"
body = """
<p>Syntalos 3.0 is a major new release that introduces breaking changes
to the module API and to some streamed data types.</p>
<p>Existing projects from the 2.x series may need adjustments, and
out-of-tree modules and custom PyScript snippets will need to be ported
before they can be used again. Please read the porting guide
<b>before</b> trying to use older projects.</p>

<h3>Porting from 2.x</h3>
<p>The
<a href="https://syntalos.org/docs/porting-2to3/">2.x → 3.0 porting guide</a>
summarizes all breaking changes, with side-by-side code examples for the
most common cases. Please have a look!

<h3>What's new</h3>
<ul>
  <li><b>Network control:</b> Syntalos can now control, or be controlled by,
      other Syntalos instances over the network — enabling synchronized runs
      across a fleet of machines, even across operating systems.</li>
  <li><b>New modules:</b> A <i>Zarr Writer</i> for writing Zarr v3 array stores,
      a <i>Prism</i> module to split / merge / drop image color channels, and an
      experimental preview module for the Open Ephys AcqBoard.</li>
  <li><b>Wayland:</b> Proper, explicit Wayland support, using xx-zones for window
      positioning where available.</li>
  <li><b>IPC:</b> Migrated from iceoryx1 to iceoryx2. Latency has improved in
      our tests, but please re-validate your experiments!</li>
  <li><b>Memory:</b> Syntalos now uses the mimalloc allocator internally,
      reducing memory use and improving throughput in heavily-threaded paths.
      External processes keep the default allocator.</li>
  <li><b>Stream type casting:</b> Compatible data streams (e.g. uint16 matrices
      into int32) can now be connected directly; the UI shows a cast indicator.</li>
  <li><b>Human-friendly recording monikers:</b> In addition to the unique
      recording ID, Syntalos can produce a short, human-readable name for each
      run. Enable it in the project settings.</li>
  <li><b>Plot &amp; canvas:</b> The time-series plot has drastically faster
      rendering, and the image canvas now supports native 16-bit display.</li>
</ul>

<h3>Heads-up</h3>
<p>Support for the SDK behind the <code>camera-tis</code> module has been
discontinued by The Imaging Source. The module is now disabled by default for
builds from source, and may not be available on all platforms going forward.</p>
"""

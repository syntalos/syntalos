name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  discussions: write

jobs:
  revision:
    name: Revision update
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v7

      - name: Derive version string
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # We update the weekly snapshot tag at release time to the point of the
      # release commit. That makes the snapshots pre-release always show up
      # immediately after the current latest release in GitHub's UI.
      - name: Move snapshot tag
        run: |
          git config user.name "syntalos-robot"
          git config user.email "noreply@syntalos.org"
          git tag -f snapshot ${GITHUB_SHA}
          git push -f origin snapshot

  build-test:
    name: Test
    uses: ./.github/workflows/build-test.yml

  build-packages:
      name: Build Packages
      uses: ./.github/workflows/build-packages.yml

  release:
    name: Create Release
    needs: [revision, build-test, build-packages]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Extract release notes from NEWS.md
        env:
          RELEASE_HEADER: |
              Please refer to the [installation documentation](https://syntalos.org/docs/setup/install/) for details
              on how to install the provided binary packages for your OS or how to build Syntalos from source.

              ## Changes:
        run: |
          VERSION="${{ needs.revision.outputs.version }}"

          # write header
          printf '%s' "$RELEASE_HEADER" >> release_notes.md

          # Extract the block for this version from NEWS.md.
          # The block starts with "Version X.Y.Z" and ends before the next "Version " line.
          awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^Version / {
              if (found) exit
              if ($2 == ver) { found=1; next }
            }
            /^-+$/ && found && !body { next }
            /^Released: / && found { next }
            found { body=1; print }
          ' NEWS.md >> release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "::warning::No release notes found for version $VERSION in NEWS.md"
            echo "Release $VERSION" > release_notes.md
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          skip-decompress: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release_assets

          # Only the syntalos*.zip packages are release artifacts we want
          # to attach. Expand to nothing when a directory holds no matching package.
          shopt -s nullglob
          count=0
          for zip in artifacts/*/syntalos*.zip; do
            cp "$zip" "$GITHUB_WORKSPACE/release_assets/"
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "::error::No syntalos*.zip release packages were found among the downloaded artifacts." >&2
            exit 1
          fi

          echo "Assets to upload:"
          ls -la release_assets/

      - name: Create pristine source tarball
        env:
          VERSION: ${{ needs.revision.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release_assets
          export PKG="${GITHUB_REPOSITORY##*/}-${VERSION}"
          export STAGE="$(mktemp -d)"

          git archive --format=tar --prefix="${PKG}/" HEAD | tar -x -C "$STAGE"

          # include submodules
          git submodule foreach --recursive --quiet \
            'git archive --format=tar --prefix="${PKG}/${displaypath}/" HEAD | tar -x -C "${STAGE}"'

          # compress with xz
          tar -C "$STAGE" -cf - "${PKG}" | xz -9 -T0 \
            > "$GITHUB_WORKSPACE/release_assets/${PKG}_source.tar.xz"
          rm -rf "$STAGE"

          echo "Assets to upload:"
          ls -la release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: Version ${{ needs.revision.outputs.version }}
          discussion_category_name: announcements
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: release_assets/*


  repo-publish:
    name: Publish to package repository
    needs: [revision, release]
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Syntalos repo
        uses: actions/checkout@v7

      - name: Install Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          api-key: ${{ secrets.CLOUDSMITH_KEY }}

      - name: Upload assets to repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.revision.outputs.version }}
        run: |
          python3 << 'EOF'
          import json, os, subprocess, zipfile
          from pathlib import Path

          workspace = os.environ['GITHUB_WORKSPACE']
          version   = os.environ['VERSION']
          repo      = os.environ['GITHUB_REPOSITORY']
          base_url  = f'https://github.com/{repo}/releases/download/v{version}'

          distros = json.load(open(os.path.join(workspace, '.github/distros.json')))

          for d in distros:
              suite       = d['suite']
              artifact_id = d['artifact-id']
              distro_id   = d['distro-id']
              print(f'----\nProcessing: {distro_id}/{suite}\n----', flush=True)

              staging_dir = os.path.join(workspace, 'upload', artifact_id)
              os.makedirs(staging_dir, exist_ok=True)

              subprocess.run([
                  'gh', 'release', 'download', f'v{version}',
                  '--repo',    repo,
                  '--pattern', f'syntalos_*{artifact_id}*.zip',
                  '--dir',     staging_dir,
              ], check=True)

              for zpath in Path(staging_dir).glob(f"syntalos_*{artifact_id}*.zip"):
                  with zipfile.ZipFile(zpath) as z:
                      z.extractall(staging_dir)

              for asset in sorted(Path(staging_dir).glob('*.deb')):
                  subprocess.run([
                      'cloudsmith',
                      'push',
                      'deb',
                      '--republish',
                      f'syntalos/syntalos/{distro_id}/{suite}',
                      asset
                  ], check=True, cwd=os.path.join(workspace))
          EOF

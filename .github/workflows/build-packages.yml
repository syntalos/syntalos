name: Package Build

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  revision:
    name: Revision check
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-numeric: ${{ steps.version.outputs.version-numeric }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Determine revision number
      id: version
      run: |
        git_commit=$(git rev-parse --short HEAD)
        git_current_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo v2.0.0)
        git_commit_no=$(git rev-list --count "${git_current_tag}..HEAD" 2>/dev/null)
        SY_VERSION=${git_current_tag#v}; SY_VERSION=${SY_VERSION//-/.}
        if [ "$git_commit_no" -gt 0 ]; then
            SY_VERSION+="+git$git_commit_no"
        fi
        echo "version=${SY_VERSION}" >> $GITHUB_OUTPUT


  setup:
    name: Generate build matrix
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
    - uses: actions/checkout@v6

    - name: Generate matrix from distros.json
      id: matrix
      run: |
        python3 << 'EOF'
        import json, os

        distros = json.load(open('.github/distros.json'))
        runners = [
            {'runner': 'ubuntu-latest',    'arch': 'amd64'},
            {'runner': 'ubuntu-24.04-arm', 'arch': 'arm64'},
        ]

        includes = []
        for d in distros:
            for r in runners:
                includes.append({
                    **d, **r,
                    'name': f"{d['distro-name']} [{r['arch']}]",
                })

        matrix = json.dumps({'include': includes})
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'matrix={matrix}\n')
        EOF


  package-build:
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: [revision, setup]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true

    - name: Update cache
      run: sudo apt-get update -qq

    - name: Install system prerequisites
      run: sudo apt-get install -yq debspawn mmdebstrap debian-archive-keyring ubuntu-keyring

      # NOTE: Once changes are released, we can drop this hack
    - name: Upgrade debspawn
      run: |
          sudo rm /usr/bin/debspawn
          sudo git clone --depth 1 https://github.com/lkhq/debspawn.git /srv/debspawn
          sudo ln -s /srv/debspawn/debspawn.py /usr/bin/debspawn

    - name: Create Build Environment
      run: debspawn create ${{ matrix.create-args }} --extra-packages=curl,ca-certificates ${{ matrix.suite }}

    - name: Configure Syntalos APT Repository
      run: |
          curl -LO https://raw.githubusercontent.com/syntalos/repo/refs/heads/main/publish/setup-syntalos-repo.sh
          chmod +x setup-syntalos-repo.sh
          debspawn run --persistent -x ${{ matrix.suite }} ./setup-syntalos-repo.sh

    - name: Configure Package Build
      run: ./tests/ci/configure-deb-build.sh "${{ matrix.suite }}" "${{ matrix.slug }}"

    - name: Package Build
      run: debspawn build ${{ matrix.suite }}

    - name: Upload package artifact
      uses: actions/upload-artifact@v7
      with:
        name: syntalos_${{ needs.revision.outputs.version }}_${{ matrix.artifact-id }}_${{ matrix.arch }}
        path: |
          /var/lib/debspawn/results/*.deb
          /var/lib/debspawn/results/*.build*

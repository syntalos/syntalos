name: Package Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  revision:
    name: Revision check
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-numeric: ${{ steps.version.outputs.version-numeric }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Determine revision number
      id: version
      run: |
        git_commit=$(git rev-parse --short HEAD)
        git_current_tag=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo v0a)
        git_commit_no=$(git rev-list --count "${git_current_tag}..HEAD" 2>/dev/null)
        SY_VERSION=${git_current_tag#v}; SY_VERSION=${SY_VERSION//-/.}
        if [ "$git_commit_no" -gt 0 ]; then
            SY_VERSION+="+git$git_commit_no"
        fi
        echo "version=${SY_VERSION}" >> $GITHUB_OUTPUT


  setup:
    name: Generate build matrix
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
    - uses: actions/checkout@v6

    - name: Generate matrix from distros.json
      id: matrix
      run: |
        python3 << 'EOF'
        import json, os

        distros = json.load(open('.github/distros.json'))
        runners = [
            {'runner': 'ubuntu-latest',    'arch': 'amd64'},
            {'runner': 'ubuntu-24.04-arm', 'arch': 'arm64'},
        ]

        includes = []
        for d in distros:
            for r in runners:
                includes.append({
                    **d, **r,
                    'name': f"{d['distro-name']} [{r['arch']}]",
                })

        matrix = json.dumps({'include': includes})
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'matrix={matrix}\n')
        EOF


  package-build:
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: [revision, setup]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true

    - name: Setup debspawn
      uses: ximion/debspawn-action/setup@v1
      with:
        suite: ${{ matrix.suite }}
        components: ${{ matrix.components }}
        cache-suffix: 'deploy'
        packages: >-
          ca-certificates
          curl
          git
        script: |
          # Setup Syntalos APT Repository
          curl -fsSL https://syntalos.org/setup/setup-syntalos-repo.sh | sh

          # TODO: Remove this one iceoryx2 is available as package
          eatmydata apt-get install -yq cargo

    - name: Prepare Build
      run: |
        sudo apt-get install -yq meson

        # Make subprojects available locally - we need to ignore meson error, since
        # it downloads things, but fails after because it does not recognize the
        # cmake subproject (this is a Meson bug).
        git submodule update --init --recursive
        meson subprojects download || true

        # TODO: Remove this one iceoryx2 is available as package
        git clone --depth=1 https://github.com/eclipse-iceoryx/iceoryx2.git vendor/iceoryx2

    - name: Build Package
      uses: ximion/debspawn-action/build@v1
      with:
        suite: ${{ matrix.suite }}
        version-slug: ${{ matrix.slug }}
        debian-dir: 'contrib/debian'
        # TODO: Remove this one iceoryx2 is available as package
        network: true

    - name: Rename ddebs
      run: |
        for f in build-results/*.ddeb; do
          [ -e "$f" ] || continue
          new="${f%.ddeb}.deb"
          [ -e "$new" ] || mv -- "$f" "$new"
        done

    - name: Upload package artifact
      uses: actions/upload-artifact@v7
      with:
        name: syntalos_${{ needs.revision.outputs.version }}_${{ matrix.artifact-id }}_${{ matrix.arch }}
        path: |
          build-results/*.deb
          build-results/*.build*

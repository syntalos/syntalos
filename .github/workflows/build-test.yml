name: Build Test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

jobs:
  build-test:
    name: ${{ matrix.display_name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - id: debian-stable
            display_name: Debian Stable
            suite: trixie
            components: main
            runner: ubuntu-latest
          - id: debian-stable-arm64
            display_name: Debian Stable (arm64)
            suite: trixie
            components: main
            runner: ubuntu-24.04-arm
          - runner: ubuntu-latest
            id: debian-testing
            display_name: Debian Testing
            suite: testing
            components: main
          - id: ubuntu-lts
            display_name: Ubuntu LTS
            suite: resolute
            components: main universe
            runner: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Setup & start resource sampler
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yq python3-psutil python3-matplotlib

        nohup python3 tests/ci/ci-resource-sampler.py /tmp/ci-resources.csv \
          > /tmp/ci-resources.sampler.log 2>&1 &
        echo $! > /tmp/ci-resources.pid
        : > /tmp/ci-resources.markers

    - name: Create Build Environment
      uses: ximion/debspawn-action/setup@v1
      with:
        name: ci-${{ matrix.id }}
        suite: ${{ matrix.suite }}
        components: ${{ matrix.components }}
        cache-suffix: 'ci'
        packages: >-
          ca-certificates
          curl
          git
        script: |
          # Setup Syntalos APT Repository
          curl -fsSL https://syntalos.org/setup/setup-syntalos-repo.sh | sh

          # install build dependencies
          ./tests/ci/install-deps-deb.sh

          # install extra dependencies
          ./tests/ci/install-deps-deb-extra.sh

    - name: Mark build phase
      run: |
        echo "build-start,$(date +%s.%N)" >> /tmp/ci-resources.markers

    - name: Build
      uses: ximion/debspawn-action/run@v1
      with:
        name: ci-${{ matrix.id }}
        suite: ${{ matrix.suite }}
        summary: "Build Syntalos on ${{ matrix.display_name }}"
        commands: |
          CC=gcc CXX=g++ ./tests/ci/ci-build.sh

    - name: Mark test phase
      run: |
        echo "test-start,$(date +%s.%N)" >> /tmp/ci-resources.markers

    - name: Test
      uses: ximion/debspawn-action/run@v1
      with:
        name: ci-${{ matrix.id }}
        suite: ${{ matrix.suite }}
        summary: "Test Syntalos on ${{ matrix.display_name }}"
        commands: |
          ./tests/ci/ci-test.sh

    - name: Stop sampler and render report
      if: always()
      run: |
        echo "end,$(date +%s.%N)" >> /tmp/ci-resources.markers
        if [ -f /tmp/ci-resources.pid ]; then
          kill "$(cat /tmp/ci-resources.pid)" 2>/dev/null || true
          sleep 3
        fi
        python3 tests/ci/ci-resource-plot.py \
          /tmp/ci-resources.csv \
          /tmp/ci-resources.markers \
          "${{ matrix.display_name }}" \
          /tmp/ci-resources.png \
          >> "$GITHUB_STEP_SUMMARY"

    - name: Upload instrumentation samples
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: resource-samples-${{ matrix.id }}
        path: |
          /tmp/ci-resources.csv
          /tmp/ci-resources.markers
          /tmp/ci-resources.sampler.log
          /tmp/ci-resources.png
        if-no-files-found: warn
        retention-days: 7

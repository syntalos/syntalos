id: org.syntalos.syntalos
runtime: org.kde.Sdk
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: syntalos
rename-icon: syntalos
rename-desktop-file: syntalos.desktop

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --device=all
  - --filesystem=host
  - --socket=system-bus
  - --socket=session-bus
  - --socket=pulseaudio
  - --allow=devel
  - --allow=bluetooth
  - --filesystem=/run/udev:ro  # needed for libcamera's udev enumeration & some controllers
  - --filesystem=xdg-run/pipewire-0:ro
  - --env=PATH=/app/bin:/usr/bin:/usr/sbin
  - --env=GST_PLUGIN_PATH=/app/lib/gstreamer-1.0:/usr/lib/extensions/gstreamer-1.0
  - --require-version=1.14.0

cleanup-commands:
  # we can't run the "cleanup-BaseApp-QtWebEngine.sh" script, as it will nuke
  # include files and pkgconfig data that we want to keep in the final bundle
  - rm /app/cleanup-BaseApp-QtWebEngine.sh
  - /app/cleanup-BaseApp.sh
  - rm -rfv ${FLATPAK_DEST}/bin/event_rpcgen.py
  - rm -rfv ${FLATPAK_DEST}/bin/qwebengine_convert_dict
  - rm -rfv ${FLATPAK_DEST}/lib/${FLATPAK_ARCH}-linux-gnu/metatypes
  - rm -rfv ${FLATPAK_DEST}/lib/${FLATPAK_ARCH}-linux-gnu/*.prl
  - rm -rfv ${FLATPAK_DEST}/lib/libexec/{gn,qwebengine_convert_dict}
  - rm -rfv ${FLATPAK_DEST}/lib/metatypes
  - rm -rfv ${FLATPAK_DEST}/mkspecs
  - rm -rfv ${FLATPAK_DEST}/lib/modules
  - rm -rfv ${FLATPAK_DEST}/lib/plugins/designer

modules:

  - name: OpenCL
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/KhronosGroup/OpenCL-Headers/archive/refs/tags/v2024.10.24.tar.gz
        sha256: 159f2a550592bae49859fee83d372acd152328fdf95c0dcd8b9409f8fad5db93

  - name: toml++
    buildsystem: meson
    builddir: true
    sources:
      - type: archive
        url: https://github.com/marzer/tomlplusplus/archive/refs/tags/v3.4.0.tar.gz
        sha256: 8517f65938a4faae9ccf8ebb36631a38c1cadfb5efa85d9a72e15b9e97d25155

  - name: blake3
    buildsystem: cmake-ninja
    builddir: true
    subdir: c/
    config-opts:
      - -DBUILD_SHARED_LIBS:BOOL=YES
    sources:
      - type: archive
        url: https://github.com/BLAKE3-team/BLAKE3/archive/refs/tags/1.8.5.tar.gz
        sha256: 220bd81286e2a0585beac66d41ac3f4c2c33ae8a4e339fc88cf22d5e00514fe9

  - name: iceoryx2
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_CXX=ON
      - -DBUILD_TESTING=OFF
      - -DBUILD_EXAMPLES=OFF
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/iceoryx2/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: archive
        url: https://github.com/eclipse-iceoryx/iceoryx2/archive/refs/tags/v0.9.1.tar.gz
        sha256: d76043b1639267086ba6a7f2f8c9e2b7ddb7e38eb3757106cbaf24ee7aadaab5
      - modules/iceoryx2-cargo-sources.json

  - name: quill
    buildsystem: meson
    builddir: true
    sources:
      - type: archive
        url: https://github.com/odygrd/quill/releases/download/v11.1.0/quill-11.1.0.zip
        sha256: 2c2aa4c09e11965215656cc11233d5612ee20df4e0cf4664a0b1f74af0059360

  - name: mimalloc
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DMI_BUILD_SHARED:BOOL=ON
      - -DMI_BUILD_STATIC:BOOL=OFF
      - -DMI_BUILD_OBJECT:BOOL=ON
      - -DMI_OVERRIDE:BOOL=ON
      - -DMI_OPT_ARCH:BOOL=ON
      - -DMI_INSTALL_TOPLEVEL:BOOL=ON
    sources:
      - type: archive
        url: https://github.com/microsoft/mimalloc/releases/download/v3.3.2/mimalloc-v3.3.2-source.tar.gz
        sha256: 7ced84a659a95454ce08b725af56331164e6b8673310e5a9a5c612576145456f

  - name: openblas
    no-autogen: true
    make-args:
      - DYNAMIC_ARCH=1
      - FC=gfortran
      - NO_LAPACKE=1
      - USE_OPENMP=1
      - NO_WARMUP=1
      - NUM_THREADS=128
    make-install-args:
      - PREFIX=/app
    cleanup:
      - /bin
      - /include
      - /lib/cmake
      - /lib/*.a
      - /lib/*.la
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/archive/v0.3.33.tar.gz
        sha512: 68fa2b90a93a2dfd84dfa586af07d90952fd4f2ad8dfe26061be250e80fec8f1a76ad78977f217c7dbdd26291249f1ac38a07f08ef323eee7a248c4cb67cd670
        x-checker-data:
          type: anitya
          project-id: 2540
          url-template: https://github.com/OpenMathLib/OpenBLAS/archive/v$version.tar.gz

  - name: eigen3
    buildsystem: cmake-ninja
    builddir: true
    cleanup: [] # we don't cleanup headers for Syntalos C++ developer modules
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.bz2
        sha256: b4c198460eba6f28d34894e3a5710998818515104d6e74e5cc331ce31e46e626

  - modules/usbutils.yaml
  - modules/ffmpeg.yaml

  - name: pybind11
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DPYBIND11_INSTALL:BOOL=ON
      - -DPYBIND11_TEST:BOOL=OFF
      - -DPYTHON_INCLUDE_DIRS=/usr/include/python3.13
    sources:
      - type: archive
        url: https://github.com/pybind/pybind11/archive/refs/tags/v3.0.4.tar.gz
        sha256: 74b6a2c2b4573a400cafb6ecbf60c98df300cd3d0041296b913d02b2cbbb2676

  - modules/git.yaml
  - modules/numpy.yaml
  - modules/opencv.yaml
  - modules/iir1.yaml
  - modules/qtermwidget.yaml
  - modules/zeromq.yaml
  - modules/winpos-qt.yaml
  - modules/nlohmann-json.yaml
  - modules/python/module-requirements.yaml
  - modules/aravis.yaml
  - modules/libcamera.yaml
  - modules/tiscamera.yaml

  # Syntalos' Intan-RHX module requires Lua 5.3 for the OpalKelly FrontPanel library
  - shared-modules/lua5.3/lua-5.3.5.json
  - name: okfrontpanel-liblua-compat-symlink
    buildsystem: simple
    build-commands:
      - ln -sf liblua.so.5.3 /app/lib/liblua5.3.so.0

  # the Miniscope module needs libminiscope via PoMiDAQ
  - name: pomidaq
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DPYTHON=OFF
      - -DGUI=OFF
    sources:
      - type: git
        url: https://github.com/bothlab/pomidaq.git
        tag: v0.6.1

  - name: syntalos
    buildsystem: meson
    builddir: true
    cleanup: [] # we don't clean up development headers for the C++ workbench Syntalos module
    config-opts:
      - -Doptimize-modern-amd64=true
      - -Dudevdir=/app/lib/udev
    build-options:
      arch:
        aarch64:
          config-opts:
            - -Ddisabled-modules=intan-rhx,open-ephys-acq
    sources:
       - type: git
         url: https://github.com/syntalos/syntalos.git
         path: ../..

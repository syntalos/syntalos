[test]
name = "IPC Test - Python/C++ Scripting"
project_file = "projects/ipc-test-pycpp-scripts.syct"
run_duration_sec = 10
expected_exit_code = 0
expected_stdout_contains = [
    "Module start order: Devel: DataSource ⇢ Python Script ⇢ C++ Workbench ⇢ Input Tab ⇢ PyScript Canvas ⇢ Py Video Recorder ⇢ C++ Canvas ⇢ Output Tab ⇢ Cpp Video Recorder"
]

[[test.expected_output_files]]
path = "attributes.toml"
toml_fields = ["machine_node", "success"]

[[test.expected_output_files]]
path = "manifest.toml"
toml_fields = ["collection_id", "format_version", "time_created", "type", "generator"]

[[test.expected_datasets]]
name = "table-input"
csv = { expected_headers = ['Time', 'Tag', 'Value'], min_rows = 4 }

[[test.expected_datasets]]
name = "videos/c++-workbench"
media_type = "video/x-matroska"
video = { min_frames = 150 }
tsync = { min_entries = 150, monotonic_column = "master-time" }

[[test.expected_datasets]]
name = "videos/python-script"
media_type = "video/x-matroska"
video = { min_frames = 150 }
tsync = { min_entries = 150, monotonic_column = "master-time" }

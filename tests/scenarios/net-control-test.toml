[test]
name = "Network Control Test"
project_file = "projects/net-control-test.syct"
run_duration_sec = 8
timeout_sec = 60
expected_exit_code = 0
use_dynamic_net_ports = true

[test.companion_process]
script = "validators/net_ctl_listener.py"
startup_wait_sec = 1.5
expected_stdout_contains = [
    "Received: prepare",
    "Received: start",
    "Received: stop",
]

[[test.expected_output_files]]
path = "attributes.toml"
toml_fields = ["machine_node", "success"]

[[test.expected_output_files]]
path = "manifest.toml"
toml_fields = ["collection_id", "format_version", "time_created", "type", "generator"]
[test]
name = "IPC Test - Python/C++ Modules"
project_file = "projects/ipc-test-pycpp-mods.syct"
run_duration_sec = 8
expected_exit_code = 0
expected_stdout_contains = ["Module start order: Devel: DataSource ⇢ LibMod Example ⇢ ExtMod Example ⇢ Raw Table ⇢ PyMod Example ⇢ Video Recorder 2 ⇢ LibMod Canvas ⇢ ExtMod Table ⇢ PyMod Canvas ⇢ PyMod Table ⇢ Video Recorder"]

[[test.expected_output_files]]
path = "attributes.toml"
toml_fields = ["machine_node", "success"]

[[test.expected_output_files]]
path = "manifest.toml"
toml_fields = ["collection_id", "format_version", "time_created", "type", "generator"]

[[test.expected_datasets]]
name = "table-input"
csv = { expected_headers = ['Time', 'Tag', 'Value'], min_rows = 4 }

[[test.expected_datasets]]
name = "extmod-example"
csv = { expected_headers = ['Time', 'Tag', 'Value'], min_rows = 4 }

[[test.expected_datasets]]
name = "pymod-example"
csv = { expected_headers = ['Time Received [us]', 'Frame Number'], min_rows = 6 }

[[test.expected_datasets]]
name = "videos/libmod-example"
media_type = "video/x-matroska"
video = { min_frames = 400 }
tsync = { min_entries = 400, monotonic_column = "master-time" }

[[test.expected_datasets]]
name = "videos/pymod-example"
media_type = "video/x-matroska"
video = { min_frames = 400 }
tsync = { min_entries = 400, monotonic_column = "master-time" }

[test]
name = "IPC Test - Simple Topology"
project_file = "projects/ipc-test-simple.syct"
run_duration_sec = 6
expected_exit_code = 0

[[test.expected_output_files]]
path = "attributes.toml"
toml_fields = ["machine_node", "success"]

[[test.expected_output_files]]
path = "manifest.toml"
toml_fields = ["collection_id", "format_version", "time_created", "type", "generator"]

[[test.expected_datasets]]
name = "oop-dev-tab"
csv = { expected_headers = ["Index", "Frame Time"], min_rows = 5 }

[[test.expected_datasets]]
name = "oop-example-tab"
csv = { expected_headers = ["Time", "Tag", "Value"], min_rows = 2 }

[[test.expected_datasets]]
name = "videos/python-script"
media_type = "video/x-matroska"
video = { min_frames = 480 }
tsync = { min_entries = 480, monotonic_column = "master-time" }
